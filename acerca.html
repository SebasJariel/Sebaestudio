<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Visor PDF</title>
    <style>
        :root { --bg:#f4f6f8; --panel:#fff; --accent:#0b63ff; --muted:#6b7280; }
        body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial; background:var(--bg); color:#111; }
        .topbar { display:flex; gap:.5rem; align-items:center; padding:12px; background:var(--panel); box-shadow:0 1px 0 rgba(0,0,0,.06); }
        .controls { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
        input[type="url"], button, a { padding:.5rem .6rem; border:1px solid #d1d5db; border-radius:6px; background:white; font-size:15px; text-decoration:none; color:inherit; }
        button.primary, a.primary { background:var(--accent); color:white; border-color:transparent; cursor:pointer; }
        button:active { transform:translateY(1px); }
        .viewer-wrap { height: calc(100vh - 64px); display:flex; background: #00000014; align-items:stretch; padding:12px; box-sizing:border-box; }
        .viewer { flex:1; border-radius:8px; overflow:hidden; background:#fff; display:flex; align-items:center; justify-content:center; }
        embed, iframe { width:100%; height:100%; border:0; display:block; }
        .muted { color:var(--muted); font-size:13px; margin-left:.5rem; }
        .small { font-size:13px; color:var(--muted); }
    </style>
</head>
<body>
    <div class="topbar">
        <strong>Visor PDF</strong>
        <div style="flex:1"></div>
        <div class="controls">
            <!-- Se quitó el botón "Cargar", los botones de zoom y el botón "Abrir"; el PDF se elige desde el código -->
            <a id="download" class="primary" href="files/cv_sebastian-jara.pdf" download>Descargar</a>
        </div>
    </div>

    <div class="viewer-wrap">
        <div class="viewer" id="viewer">
            <!-- Carga por defecto el CV especificado en el código -->
            <embed id="pdfEmbed" type="application/pdf" src="files/cv_sebastian-jara.pdf" />
            <div id="fallback" class="small muted" style="display:none; padding:18px; text-align:center;">
                No se pudo mostrar el PDF. Intente abrirlo en una nueva pestaña o descárguelo.
            </div>
        </div>
    </div>

    <script>
        // PDF seleccionado desde el código (modificar esta constante para cambiar el CV)
        const DEFAULT_PDF = 'files/cv_sebastian-jara.pdf';

        const embed = document.getElementById('pdfEmbed');
        const fallback = document.getElementById('fallback');
        const download = document.getElementById('download');

        function setEmbedSrc(src) {
            if (!src) {
                embed.removeAttribute('src');
                fallback.style.display = 'block';
                download.href = '';
                return;
            }
            embed.src = src;
            download.href = src;
            fallback.style.display = 'none';
        }

        embed.addEventListener('error', () => {
            fallback.style.display = 'block';
        });

        // Inicializar con el PDF definido en el código
        setEmbedSrc(DEFAULT_PDF);
    </script>
</body>
</html>
